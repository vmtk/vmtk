name: Build and Test VMTK with VTK 9.6

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-test:
    name: Build and Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    env:
      VTK_VERSION: "9.6.0"
      BUILD_TYPE: Release
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libglu1-mesa-dev libxmu-dev libxi-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install cmake

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' --yes

      - name: Download and extract VTK SDK (Linux)
        if: runner.os == 'Linux'
        run: |
          wget https://github.com/Kitware/VTK/releases/download/v${{ env.VTK_VERSION }}/VTK-${{ env.VTK_VERSION }}-Linux.tar.gz -O vtk.tar.gz
          mkdir -p vtk-sdk
          tar -xzf vtk.tar.gz -C vtk-sdk --strip-components=1

      - name: Download and extract VTK SDK (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -L https://github.com/Kitware/VTK/releases/download/v${{ env.VTK_VERSION }}/VTK-${{ env.VTK_VERSION }}-macOS.tar.gz -o vtk.tar.gz
          mkdir -p vtk-sdk
          tar -xzf vtk.tar.gz -C vtk-sdk --strip-components=1

      - name: Download and extract VTK SDK (Windows)
        if: runner.os == 'Windows'
        run: |
          curl -L -o vtk.zip https://github.com/Kitware/VTK/releases/download/v${{ env.VTK_VERSION }}/VTK-${{ env.VTK_VERSION }}-Windows.zip
          mkdir vtk-sdk
          tar -xf vtk.zip -C vtk-sdk --strip-components=1

      - name: Configure VMTK
        run: |
          cmake -S . -B build -DVTK_DIR=${{ github.workspace }}/vtk-sdk/lib/cmake/vtk-${{ env.VTK_VERSION }} -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build VMTK
        run: |
          cmake --build build --config ${{ env.BUILD_TYPE }} --parallel 2

      - name: Run tests
        run: |
          ctest --test-dir build --output-on-failure
